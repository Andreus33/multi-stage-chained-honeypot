<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OP Health Systems — Secure Portal</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-login">

  <div class="page-center">
    <div class="glass-card">

      <!-- Logo -->
      <div class="logo-wrap">
        <div class="logo-icon">🏥</div>
        <div class="logo-title">OP Health Systems</div>
        <div class="logo-sub">Secure Employee Portal</div>
      </div>

      <!-- Alerts -->
      {% if error %}
        <div class="alert alert-error">⚠ {{ error }}</div>
      {% endif %}
      {% if success %}
        <div class="alert alert-success">✓ {{ success }}</div>
      {% endif %}

      <!-- Login Form -->
      <form method="POST" action="/login" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" name="username"
                 placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password"
                 placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="margin-top:0.5rem">
          Sign In →
        </button>
      </form>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">OR</span>
        <div class="divider-line"></div>
      </div>

      <!-- Signup Link -->
      <a href="/signup" class="btn btn-ghost" style="display:block;text-align:center;text-decoration:none">
        Create New Account
      </a>

      <!-- Footer note -->
      <p style="text-align:center; margin-top:1.4rem; font-family:'Inter',sans-serif;
                 font-size:0.72rem; color:rgba(255,255,255,0.28); line-height:1.5;">
        Unauthorized access is strictly prohibited.<br>
        All activity is monitored and logged.
      </p>

    </div>
  </div>

</body>
</html>
